version: '3.8'

services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: password_molto_sicura
      MYSQL_DATABASE: my_app
    volumes:
      - db_data:/var/lib/mysql

# Task: Inserire qui sotto il servizio 'cache' usando l'immagine redis:alpine

volumes:
  db_data: